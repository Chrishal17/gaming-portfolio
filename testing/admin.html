<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Portfolio Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6e00ff;
            --primary-dark: #4a00b4;
            --secondary: #00ff88;
            --dark: #121212;
            --dark-light: #1e1e1e;
            --light: #f8f8f8;
            --gray: #333;
            --lighter-gray: #555;
            --light-gray: #ddd;
            --neon-green: #39ff14;
            --neon-blue: #4d4dff;
            --neon-purple: #bc13fe;
            --error-red: #ff3860;
            --success-green: #23d160;
            --border-radius: 10px;
            --card-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--dark) 0%, var(--dark-light) 100%);
            color: var(--light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(188, 19, 254, 0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        .bg-animation::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.1) 0%, transparent 70%);
            animation: rotate 25s linear infinite reverse;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Game UI Corner Frames */
        .game-ui-frame {
            position: fixed;
            width: 50px;
            height: 50px;
            border: 2px solid var(--neon-purple);
            z-index: 999;
            pointer-events: none;
        }

        .top-left {
            top: 20px;
            left: 20px;
            border-right: none;
            border-bottom: none;
            box-shadow: -3px -3px 10px var(--neon-purple);
        }

        .top-right {
            top: 20px;
            right: 20px;
            border-left: none;
            border-bottom: none;
            box-shadow: 3px -3px 10px var(--neon-purple);
        }

        .bottom-left {
            bottom: 20px;
            left: 20px;
            border-right: none;
            border-top: none;
            box-shadow: -3px 3px 10px var(--neon-purple);
        }

        .bottom-right {
            bottom: 20px;
            right: 20px;
            border-left: none;
            border-top: none;
            box-shadow: 3px 3px 10px var(--neon-purple);
        }

        /* Login Container */
        .login-container {
            background-color: var(--dark-light);
            border-radius: var(--border-radius);
            box-shadow: var(--card-shadow);
            border: 2px solid rgba(188, 19, 254, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            position: relative;
            backdrop-filter: blur(10px);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, var(--neon-purple), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-header p {
            color: var(--light-gray);
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--light);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 15px 20px;
            padding-left: 50px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: var(--light);
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--neon-purple);
            background-color: rgba(188, 19, 254, 0.1);
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.3);
        }

        .form-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--light-gray);
            font-size: 1.2rem;
            margin-top: 12px;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--neon-purple), var(--primary));
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(188, 19, 254, 0.5);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background-color: rgba(255, 56, 96, 0.1);
            color: var(--error-red);
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 56, 96, 0.3);
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }

        .success-message {
            background-color: rgba(35, 209, 96, 0.1);
            color: var(--success-green);
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid rgba(35, 209, 96, 0.3);
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }

        .forgot-password {
            text-align: center;
            margin-top: 20px;
        }

        .forgot-password a {
            color: var(--secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .forgot-password a:hover {
            color: var(--neon-green);
            text-shadow: 0 0 5px var(--neon-green);
        }

        /* Demo Credentials */
        .demo-credentials {
            background-color: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .demo-credentials h4 {
            color: var(--secondary);
            margin-bottom: 8px;
            font-size: 1rem;
        }

        .demo-credentials p {
            margin: 5px 0;
            color: var(--light-gray);
        }

        .demo-credentials strong {
            color: var(--light);
        }

        /* Responsive */
        @media (max-width: 576px) {
            .login-container {
                margin: 20px;
                padding: 30px 20px;
            }

            .login-header h1 {
                font-size: 2rem;
            }

            .game-ui-frame {
                width: 30px;
                height: 30px;
            }

            .top-left, .top-right {
                top: 10px;
            }

            .bottom-left, .bottom-right {
                bottom: 10px;
            }

            .top-left, .bottom-left {
                left: 10px;
            }

            .top-right, .bottom-right {
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation"></div>

    <!-- Game UI Corner Frames -->
    <div class="game-ui-frame top-left"></div>
    <div class="game-ui-frame top-right"></div>
    <div class="game-ui-frame bottom-left"></div>
    <div class="game-ui-frame bottom-right"></div>

    <div class="login-container">
        <div class="login-header">
            <h1><i class="fas fa-shield-alt"></i> Admin Login</h1>
            <p>Portfolio Dashboard Access</p>
        </div>

        <!-- Demo Credentials -->
        <!-- <div class="demo-credentials">
            <h4><i class="fas fa-info-circle"></i> Demo Credentials</h4>
            <p><strong>Username:</strong> admin</p>
            <p><strong>Password:</strong> admin123</p>
        </div> -->

        <div class="error-message" id="errorMessage">
            <i class="fas fa-exclamation-triangle"></i> <span id="errorText"></span>
        </div>

        <div class="success-message" id="successMessage">
            <i class="fas fa-check-circle"></i> <span id="successText"></span>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <div style="position: relative;">
                    <i class="fas fa-user form-icon"></i>
                    <input type="text" id="username" class="form-control" placeholder="Enter your username" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div style="position: relative;">
                    <i class="fas fa-lock form-icon"></i>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                </div>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                <span id="loginBtnText">
                    <i class="fas fa-sign-in-alt"></i> Login to Dashboard
                </span>
            </button>
        </form>

        <!-- <div class="forgot-password">
            <a href="#" onclick="showForgotPassword()">
                <i class="fas fa-question-circle"></i> Forgot Password?
            </a>
        </div> -->
    </div>

    <script>
        // Check if user is already logged in
        document.addEventListener('DOMContentLoaded', function() {
            if (isLoggedIn()) {
                window.location.href = 'admin-dashboard.html';
            }
        });

        // Login form handler
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            handleLogin();
        });

        function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const loginBtn = document.getElementById('loginBtn');
            const loginBtnText = document.getElementById('loginBtnText');

            // Clear previous messages
            hideMessages();

            // Validate inputs
            if (!username || !password) {
                showError('Please enter both username and password.');
                return;
            }

            // Show loading state
            loginBtn.disabled = true;
            loginBtnText.innerHTML = '<div class="loading-spinner"></div> Authenticating...';

            // Simulate authentication delay
            setTimeout(() => {
                // Check credentials (in real app, this would be server-side)
                if (authenticateUser(username, password)) {
                    // Set session
                    setUserSession(username);
                    
                    // Show success message
                    showSuccess('Login successful! Redirecting to dashboard...');
                    
                    // Redirect after short delay
                    setTimeout(() => {
                        window.location.href = 'admin-dashboard.html';
                    }, 1500);
                } else {
                    // Show error
                    showError('Invalid username or password. Please try again.');
                    
                    // Reset button
                    loginBtn.disabled = false;
                    loginBtnText.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to Dashboard';
                }
            }, 1500);
        }

        function authenticateUser(username, password) {
            // Demo credentials - in real app, this would be server-side validation
            const validCredentials = [
                { username: 'admin', password: 'admin123' },
                { username: 'chris', password: 'portfolio2024' },
                { username: 'demo', password: 'demo123' }
            ];

            return validCredentials.some(cred => 
                cred.username === username && cred.password === password
            );
        }

        function setUserSession(username) {
            const sessionData = {
                username: username,
                loginTime: Date.now(),
                isAuthenticated: true
            };
            
            // Store in localStorage and sessionStorage for persistence
            localStorage.setItem('adminSession', JSON.stringify(sessionData));
            sessionStorage.setItem('adminSession', JSON.stringify(sessionData));
        }

        function isLoggedIn() {
            const session = localStorage.getItem('adminSession') || sessionStorage.getItem('adminSession');
            
            if (!session) return false;
            
            try {
                const sessionData = JSON.parse(session);
                
                // Check if session is valid (not older than 24 hours)
                const sessionAge = Date.now() - sessionData.loginTime;
                const maxAge = 24 * 60 * 60 * 1000; // 24 hours
                
                if (sessionAge > maxAge) {
                    // Session expired
                    clearSession();
                    return false;
                }
                
                return sessionData.isAuthenticated === true;
            } catch (error) {
                console.error('Invalid session data:', error);
                clearSession();
                return false;
            }
        }

        function clearSession() {
            localStorage.removeItem('adminSession');
            sessionStorage.removeItem('adminSession');
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            
            errorText.textContent = message;
            errorDiv.style.display = 'block';
            
            // Auto-hide after 5 seconds
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            const successText = document.getElementById('successText');
            
            successText.textContent = message;
            successDiv.style.display = 'block';
        }

        function hideMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }

        function showForgotPassword() {
            alert('Demo App: Contact the administrator to reset your password.\n\nFor demo purposes, use:\nUsername: admin\nPassword: admin123');
        }

        // Auto-fill demo credentials on double-click
        document.querySelector('.demo-credentials').addEventListener('dblclick', function() {
            document.getElementById('username').value = 'admin';
            document.getElementById('password').value = 'admin123';
        });

        // Enter key support
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !document.getElementById('loginBtn').disabled) {
                handleLogin();
            }
        });
    </script>
</body>
</html>
